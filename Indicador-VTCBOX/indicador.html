      line-height: 1.1;
      margin-top: 8px;
      letter-spacing: -0.03em;
    }

    .kpi.ok .val { color: var(--green); }
    .kpi.warn .val { color: var(--orange); }

      display: flex;
      border: 1px solid var(--line);

    .bar-fill-green { background: var(--green); height: 100%; }
    .bar-fill-orange { background: var(--orange); height: 100%; }
    .split {

      gap: 18px;
      margin-bottom: 22px;
    }
    @media (max-width: 900px) { .split { grid-template-columns: 1fr; } }
    .panel {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);

    th, td { padding: 11px 16px; text-align: left; border-bottom: 1px solid var(--line); }

    .uf-grid {

      padding: 16px;

    .uf-card {

      padding: 14px;
      text-align: center;

    .uf-card .ent { color: var(--green); }
    .uf-card .rota { color: var(--orange); }
    .toolbar {

    .toolbar input {

      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 1rem;
      background: var(--card);
      color: var(--ink);
    }

  </style>
</head>
